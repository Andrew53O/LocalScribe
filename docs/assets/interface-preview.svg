<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">ScribeLocal interface preview</title>
  <desc id="desc">Stylized preview of the ScribeLocal app with controls, a transcript, and a synced media player.</desc>
