  <text x="70" y="88" fill="#17211c" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">ScribeLocal</text>
  <text x="70" y="119" fill="#607064" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Local-first media transcription</text>
  <rect x="70" y="154" width="240" height="46" rx="8" fill="#1f6f54"/>
  <text x="190" y="183" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Transcribe Segment</text>
